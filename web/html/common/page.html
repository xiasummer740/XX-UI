<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="{{ .base_path }}assets/ant-design-vue/antd.min.css">
  <link rel="stylesheet" href="{{ .base_path }}assets/css/custom.min.css?{{ .cur_ver }}">
  <style>
    /* ===== XX-UI GRADIENT SYSTEM ===== */
    /* Single unified gradient that cycles through 5 color schemes via @keyframes */
    :root {
      --xx-grad-angle: 135deg;
      --xx-grad-size: 800%;
      --xx-grad-duration: 30s;
      --xx-glow-color: rgba(168, 85, 247, 0.15);
      --xx-glow-border: rgba(168, 85, 247, 0.25);
    }
    /* Aurora (极光) — default */
    html {
      --xx-grad-colors: #ff6b9d, #a855f7, #3b82f6, #14b8a6, #f97316, #ec4899, #8b5cf6;
      --xx-glow-color: rgba(168, 85, 247, 0.15);
      --xx-glow-border: rgba(168, 85, 247, 0.25);
    }

    /* ===== VIBRANT FLOWING GRADIENT ===== */
    @keyframes flowGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .xx-ui-flow-bg {
      background: linear-gradient(135deg, #667eea, #764ba2, #a78bfa, #667eea) !important;
      background-size: 300% 300% !important;
      animation: flowGradient 6s ease infinite !important;
    }
    .xx-ui-flow-bg-light {
      background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.05), rgba(167,139,250,0.08), rgba(102,126,234,0.08)) !important;
      background-size: 300% 300% !important;
      animation: flowGradient 8s ease infinite !important;
    }
    /* VPS card input styling */
    .vps-card .ant-input, .vps-card .ant-input-number {
      background: rgba(255,255,255,0.15) !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      color: #fff !important;
    }
    .vps-card .ant-input::placeholder {
      color: rgba(255,255,255,0.5) !important;
    }
    .vps-card .ant-calendar-picker {
      width: 100% !important;
    }
    /* ===== SITE-WIDE GRADIENT SYSTEM ===== */
    /*
     * KEY DESIGN PRINCIPLES:
     * 1. NEVER switch background in @keyframes — causes flash/repaint.
     *    Instead, use ONLY background-position animation on fixed gradients.
     * 2. All overlay layers use z-index: -1 to stay BEHIND content.
     * 3. Opacity max is 0.3 — subtle enough to not obscure text.
     * 4. Colors are soft pastel/light — no dark or intense colors.
     *
     * Architecture:
     * - html: base gradient, continuously flowing via background-position
     * - html::before (z-index: -1): overlay that fades in/out, slides diagonally
     * - .xx-glow-overlay (z-index: -1): subtle radial pulse for depth
     */

    /* ===== BASE GRADIENT ===== */
    /* A single fixed gradient that never changes — only background-position animates */
    html {
      background:
        linear-gradient(135deg,
          #fce4ec, #f3e5f5, #e3f2fd, #e0f2f1, #fff3e0,
          #fce4ec, #f3e5f5, #e3f2fd, #e0f2f1, #fff3e0);
      background-size: 1000% 1000%;
      background-attachment: fixed;
      animation: baseFlow 120s ease-in-out infinite;
      min-height: 100%;
    }
    body {
      background: transparent !important;
      min-height: 100vh;
    }

    /* ===== SUBTLE OVERLAY ===== */
    /* A single overlay that fades in/out and slides diagonally.
     * z-index: -1 ensures it's always BEHIND all content.
     * Max opacity 0.3 — never obscures text.
     * The gradient value is FIXED — only opacity and background-position animate.
     */
    html::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(135deg,
          #e8eaf6, #f3e5f5, #e0f7fa, #e0f2f1, #fff8e1,
          #e8eaf6, #f3e5f5, #e0f7fa, #e0f2f1, #fff8e1);
      background-size: 1000% 1000%;
      background-position: 0% 0%;
      pointer-events: none;
      z-index: -1;
      opacity: 0;
      animation: overlayCycle 120s ease-in-out infinite;
    }

    /*
     * Base flow: continuously shifts background-position in a circular pattern.
     * 120s full cycle — very slow, gentle movement.
     * Only background-position changes — NO background value change = no flash.
     */
    @keyframes baseFlow {
      0%   { background-position: 0% 50%; }
      25%  { background-position: 50% 0%; }
      50%  { background-position: 100% 50%; }
      75%  { background-position: 50% 100%; }
      100% { background-position: 0% 50%; }
    }

    /*
     * Overlay cycle: 120s total.
     * Only opacity and background-position animate — NO background value change = no flash.
     * Phase 1 (0-15%): fade IN, slide from top-left toward center
     * Phase 2 (15-40%): hold at peak opacity
     * Phase 3 (40-55%): fade OUT, slide toward bottom-right
     * Phase 4 (55-100%): hidden, waiting for next cycle
     */
    @keyframes overlayCycle {
      0%   { opacity: 0; background-position: 0% 0%; }
      8%   { opacity: 0; background-position: 0% 0%; }
      15%  { opacity: 0.25; background-position: 25% 25%; }
      30%  { opacity: 0.30; background-position: 40% 40%; }
      40%  { opacity: 0.25; background-position: 55% 55%; }
      48%  { opacity: 0;   background-position: 70% 70%; }
      55%  { opacity: 0;   background-position: 100% 100%; }
      100% { opacity: 0; background-position: 100% 100%; }
    }

    /*
     * Subtle radial glow pulse for depth.
     * z-index: -1 ensures it's behind content.
     */
    .xx-glow-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: -1;
      animation: glowPulse 10s ease-in-out infinite alternate;
    }
    @keyframes glowPulse {
      0%   { opacity: 0.10; }
      100% { opacity: 0.30; }
    }

    /* ===== XX-UI CUSTOM LOADING SPINNER ===== */
    @keyframes xxSpin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes xxSpinDash {
      0%   { stroke-dashoffset: 126; }
      50%  { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 126; }
    }
    .xx-ui-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      animation: xxSpin 1.2s linear infinite;
    }
    .xx-ui-spinner-circle {
      fill: none;
      stroke: url(#logoGrad);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 126;
      stroke-dashoffset: 126;
      animation: xxSpinDash 1.5s ease-in-out infinite;
    }

    /* ===== LIGHT THEME: transparent layout backgrounds (all pages including login) ===== */
    .light #app,
    .light #content-layout,
    .light #content-layout .ant-layout-content,
    .light #content-layout .ant-spin-nested-loading,
    .light #content-layout .ant-spin-container,
    .light .login-app,
    .light .login-app .ant-layout-content,
    .light .login-app .under,
    .light .login-app .ant-layout {
      background: transparent !important;
    }

    /* ===== LIGHT THEME: login card glassmorphism ===== */
    .light #login {
      background: rgba(255, 255, 255, 0.20) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      border: 1px solid rgba(255, 255, 255, 0.30) !important;
      border-radius: 16px !important;
      padding: 32px !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10) !important;
    }
    /* Login page waves — very subtle so gradient shows through */
    .light .waves-header .waves use {
      opacity: 0.3 !important;
    }

    /* ===== LIGHT THEME: sidebar glassmorphism ===== */
    .light .ant-layout-sider {
      background: rgba(255, 255, 255, 0.15) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
    }
    .light .ant-layout-sider .ant-menu {
      background: transparent !important;
    }

    /* ===== LIGHT THEME: mobile drawer glassmorphism ===== */
    .light .ant-drawer-content-wrapper,
    .light .ant-drawer-content {
      background: rgba(255, 255, 255, 0.80) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
    }
    .light .ant-drawer-wrapper-body {
      background: transparent !important;
    }
    .light .ant-drawer .ant-menu {
      background: transparent !important;
    }

    /* ===== LIGHT THEME: ALL cards — high transparency glassmorphism ===== */
    .light #content-layout .ant-card {
      background: rgba(255, 255, 255, 0.35) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.50) !important;
      box-shadow: 0 4px 24px rgba(120, 140, 220, 0.12) !important;
      transition: all 0.3s ease !important;
    }
    .light #content-layout .ant-card:hover {
      background: rgba(255, 255, 255, 0.42) !important;
      box-shadow: 0 0 20px var(--xx-glow-color), 0 6px 32px rgba(120, 140, 220, 0.20) !important;
      border-color: var(--xx-glow-border) !important;
      transform: translateY(-2px);
    }

    /* ===== DARK THEME: transparent layouts (all pages including login) ===== */
    .dark #app,
    .dark #content-layout,
    .dark #content-layout .ant-layout-content,
    .dark #content-layout .ant-spin-nested-loading,
    .dark #content-layout .ant-spin-container,
    .dark .login-app,
    .dark .login-app .ant-layout-content,
    .dark .login-app .under,
    .dark .login-app .ant-layout {
      background: transparent !important;
    }

    /* ===== DARK THEME: login card glassmorphism ===== */
    .dark #login {
      background: rgba(10, 18, 34, 0.35) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      border: 1px solid rgba(255, 255, 255, 0.10) !important;
      border-radius: 16px !important;
      padding: 32px !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.30) !important;
    }
    /* Login page waves — very subtle so gradient shows through */
    .dark .waves-header .waves use {
      opacity: 0.2 !important;
    }

    /* ===== DARK THEME: sidebar glassmorphism ===== */
    .dark .ant-layout-sider {
      background: rgba(10, 18, 34, 0.40) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
    }
    .dark .ant-layout-sider .ant-menu {
      background: transparent !important;
    }

    /* ===== DARK THEME: mobile drawer ===== */
    .dark .ant-drawer-content-wrapper,
    .dark .ant-drawer-content {
      background: rgba(10, 18, 34, 0.85) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
    }
    .dark .ant-drawer-wrapper-body {
      background: transparent !important;
    }
    .dark .ant-drawer .ant-menu {
      background: transparent !important;
    }

    /* ===== DARK THEME: cards glassmorphism + glow hover ===== */
    .dark #content-layout .ant-card {
      background: rgba(15, 25, 45, 0.45) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25) !important;
      transition: all 0.3s ease !important;
    }
    .dark #content-layout .ant-card:hover {
      background: rgba(20, 32, 55, 0.50) !important;
      box-shadow: 0 0 24px var(--xx-glow-color), 0 6px 32px rgba(0, 0, 0, 0.35) !important;
      border-color: var(--xx-glow-border) !important;
      transform: translateY(-2px);
    }
    [v-cloak] {
      display: none;
    }
    /* vazirmatn-regular - arabic_latin_latin-ext */
    @font-face {
      font-display: swap;
      font-family: 'Vazirmatn';
      font-style: normal;
      font-weight: 400;
      src: url('{{ .base_path }}assets/Vazirmatn-UI-NL-Regular.woff2') format('woff2');
      unicode-range: U+0600-06FF, U+200C-200E, U+2010-2011, U+204F, U+2E41, U+FB50-FDFF, U+FE80-FEFC, U+0030-0039;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Vazirmatn', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    
    /* mobile touch scrolling for tabs */
    @media (max-width: 576px) {
      .ant-tabs-nav-container {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
        overscroll-behavior-x: contain;
        white-space: nowrap;
        max-width: 100%;
        padding: 0 !important;
      }
      .ant-tabs-nav-wrap {
        overflow: visible !important;
        padding: 0 !important;
      }
      .ant-tabs-nav-scroll {
        overflow: visible !important;
        box-shadow: none !important;
      }
      .ant-tabs-nav {
         display: flex !important;
         transform: none !important;
         width: auto !important;
         margin: 0 !important;
      }
      .ant-tabs-tab-prev,
      .ant-tabs-tab-next {
        display: none !important;
      }
      .ant-tabs-nav-container::-webkit-scrollbar {
        display: none;
      }
    }
  </style>
  <title>{{ .host }} – {{ i18n .title}}</title>
{{ end }}

{{ define "page/head_end" }}
</head>

{{ define "page/body_start" }}
<body>
  <div id="message"></div>
  <script>
    (function() {
      /* Add the glow overlay element to the DOM */
      function addGlowOverlay() {
        try {
          if (!document.querySelector('.xx-glow-overlay')) {
            var glow = document.createElement('div');
            glow.className = 'xx-glow-overlay';
            document.body.appendChild(glow);
          }
        } catch(e) {}
      }
      function applyGradient() {
        try {
          var doc = document.documentElement;
          doc.style.setProperty('background-attachment', 'fixed', 'important');
          doc.style.setProperty('min-height', '100%', 'important');
          document.body.style.setProperty('background', 'transparent', 'important');
          addGlowOverlay();
          var observer = new MutationObserver(function() {
            var app = document.getElementById('app');
            if (app) {
              app.style.setProperty('background', 'transparent', 'important');
              /* Also ensure all ant-layout children are transparent */
              var layouts = app.querySelectorAll('.ant-layout, .ant-layout-content, .ant-spin-nested-loading, .ant-spin-container');
              for (var j = 0; j < layouts.length; j++) {
                layouts[j].style.setProperty('background', 'transparent', 'important');
              }
              var isDark = document.body.classList.contains('dark');
              var sider = app.querySelector('.ant-layout-sider');
              if (sider) {
                sider.style.setProperty('background', isDark ? 'rgba(10,18,34,0.40)' : 'rgba(255,255,255,0.15)', 'important');
                sider.style.setProperty('backdrop-filter', 'blur(12px)', 'important');
              }
              var cards = app.querySelectorAll('.ant-card');
              for (var i = 0; i < cards.length; i++) {
                cards[i].style.setProperty('background', isDark ? 'rgba(15,25,45,0.45)' : 'rgba(255,255,255,0.35)', 'important');
                cards[i].style.setProperty('backdrop-filter', 'blur(20px)', 'important');
              }
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        } catch(e) {}
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyGradient);
      } else {
        applyGradient();
      }
    })();
  </script>
{{ end }}
