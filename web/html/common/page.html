<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="{{ .base_path }}assets/ant-design-vue/antd.min.css">
  <link rel="stylesheet" href="{{ .base_path }}assets/css/custom.min.css?{{ .cur_ver }}">
  <style>
    /* ===== XX-UI GRADIENT SYSTEM ===== */
    /* Single unified gradient that cycles through 5 color schemes via @keyframes */
    :root {
      --xx-grad-angle: 135deg;
      --xx-grad-size: 800%;
      --xx-grad-duration: 30s;
      --xx-glow-color: rgba(168, 85, 247, 0.15);
      --xx-glow-border: rgba(168, 85, 247, 0.25);
    }
    /* Aurora (极光) — default */
    html {
      --xx-grad-colors: #ff6b9d, #a855f7, #3b82f6, #14b8a6, #f97316, #ec4899, #8b5cf6;
      --xx-glow-color: rgba(168, 85, 247, 0.15);
      --xx-glow-border: rgba(168, 85, 247, 0.25);
    }

    /* ===== VIBRANT FLOWING GRADIENT ===== */
    @keyframes flowGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .xx-ui-flow-bg {
      background: linear-gradient(135deg, #667eea, #764ba2, #a78bfa, #667eea) !important;
      background-size: 300% 300% !important;
      animation: flowGradient 6s ease infinite !important;
    }
    .xx-ui-flow-bg-light {
      background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.05), rgba(167,139,250,0.08), rgba(102,126,234,0.08)) !important;
      background-size: 300% 300% !important;
      animation: flowGradient 8s ease infinite !important;
    }
    /* VPS card input styling */
    .vps-card .ant-input, .vps-card .ant-input-number {
      background: rgba(255,255,255,0.15) !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      color: #fff !important;
    }
    .vps-card .ant-input::placeholder {
      color: rgba(255,255,255,0.5) !important;
    }
    .vps-card .ant-calendar-picker {
      width: 100% !important;
    }
    /* ===== SITE-WIDE GRADIENT SYSTEM ===== */
    /*
     * Strategy: Use a base gradient on html that always shows, plus two pseudo-element
     * overlay gradients (html::before and html::after) that fade in/out via opacity.
     * This avoids the CSS limitation where @keyframes cannot interpolate between
     * different linear-gradient() values — instead we crossfade layers.
     *
     * Each overlay gradient slides in from a different direction (top→bottom, left→right,
     * diagonal) and its opacity fades up then down, creating a smooth "slide in/out"
     * effect. The base gradient continuously animates background-position for liquid flow.
     *
     * Colors progress from light/pastel → medium/vibrant → deeper/rich → back to light,
     * giving a natural "浅→深→浅" breathing rhythm.
     */

    /* ===== BASE GRADIENT (always visible, continuously flowing) ===== */
    html {
      /* Start with light pastel Aurora */
      background:
        linear-gradient(135deg,
          #fce4ec, #f3e5f5, #e3f2fd, #e0f2f1, #fff3e0,
          #fce4ec, #f3e5f5, #e3f2fd, #e0f2f1, #fff3e0);
      background-size: 1000% 1000%;
      background-attachment: fixed;
      animation: baseFlow 90s ease-in-out infinite;
      min-height: 100%;
    }
    body {
      background: transparent !important;
      min-height: 100vh;
    }

    /* ===== OVERLAY 1: slides in from top-left, fades in/out ===== */
    html::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(135deg,
          #f8bbd0, #e1bee7, #bbdefb, #b2dfdb, #ffe0b2,
          #f8bbd0, #e1bee7, #bbdefb, #b2dfdb, #ffe0b2);
      background-size: 1000% 1000%;
      background-position: 0% 0%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: overlay1Cycle 90s ease-in-out infinite;
    }

    /* ===== OVERLAY 2: slides in from bottom-right, fades in/out ===== */
    html::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(135deg,
          #c5cae9, #d1c4e9, #b3e5fc, #b2ebf2, #ffccbc,
          #c5cae9, #d1c4e9, #b3e5fc, #b2ebf2, #ffccbc);
      background-size: 1000% 1000%;
      background-position: 100% 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: overlay2Cycle 90s ease-in-out infinite;
    }

    /*
     * Base gradient: continuously shifts background-position for a liquid flowing effect.
     * The colors themselves stay the same (light pastel), creating a gentle shimmer.
     */
    @keyframes baseFlow {
      0%   { background-position: 0% 50%; }
      25%  { background-position: 50% 0%; }
      50%  { background-position: 100% 50%; }
      75%  { background-position: 50% 100%; }
      100% { background-position: 0% 50%; }
    }

    /*
     * Overlay 1: 90s cycle.
     * Phase 1 (0-15%): fade IN from top-left, slide diagonally → medium vibrant colors
     * Phase 2 (15-35%): hold visible, colors deepen
     * Phase 3 (35-50%): fade OUT, slide toward center
     * Phase 4 (50-100%): hidden, reset position
     */
    @keyframes overlay1Cycle {
      /* Hidden start */
      0%   { opacity: 0; background-position: 0% 0%; }
      /* Fade in — slide from top-left */
      5%   { opacity: 0; background-position: 0% 0%;
             background: linear-gradient(135deg,
               #f8bbd0, #e1bee7, #bbdefb, #b2dfdb, #ffe0b2,
               #f8bbd0, #e1bee7, #bbdefb, #b2dfdb, #ffe0b2); background-size: 1000% 1000%; }
      10%  { opacity: 0.6; background-position: 20% 20%; }
      /* Hold — colors deepen to medium vibrant */
      15%  { opacity: 0.8; background-position: 30% 30%;
             background: linear-gradient(135deg,
               #f48fb1, #ce93d8, #90caf9, #80cbc4, #ffcc80,
               #f48fb1, #ce93d8, #90caf9, #80cbc4, #ffcc80); background-size: 1000% 1000%; }
      20%  { opacity: 0.9; background-position: 40% 40%; }
      /* Peak — deepest colors */
      25%  { opacity: 1.0; background-position: 50% 50%;
             background: linear-gradient(135deg,
               #ec407a, #ab47bc, #42a5f5, #26a69a, #ffa726,
               #ec407a, #ab47bc, #42a5f5, #26a69a, #ffa726); background-size: 1000% 1000%; }
      30%  { opacity: 0.9; background-position: 60% 60%; }
      /* Fade out — slide toward center */
      35%  { opacity: 0.6; background-position: 70% 70%;
             background: linear-gradient(135deg,
               #f48fb1, #ce93d8, #90caf9, #80cbc4, #ffcc80,
               #f48fb1, #ce93d8, #90caf9, #80cbc4, #ffcc80); background-size: 1000% 1000%; }
      40%  { opacity: 0.2; background-position: 85% 85%; }
      45%  { opacity: 0;   background-position: 100% 100%; }
      /* Hidden */
      50%  { opacity: 0; background-position: 100% 100%; }
      100% { opacity: 0; background-position: 100% 100%; }
    }

    /*
     * Overlay 2: 90s cycle, offset by 30s (starts at 33%).
     * Slides from bottom-right → top-left with different color palette.
     */
    @keyframes overlay2Cycle {
      0%   { opacity: 0; background-position: 100% 100%; }
      /* Hidden during overlay1's active phase */
      30%  { opacity: 0; background-position: 100% 100%; }
      /* Fade in — slide from bottom-right */
      33%  { opacity: 0; background-position: 100% 100%;
             background: linear-gradient(135deg,
               #c5cae9, #d1c4e9, #b3e5fc, #b2ebf2, #ffccbc,
               #c5cae9, #d1c4e9, #b3e5fc, #b2ebf2, #ffccbc); background-size: 1000% 1000%; }
      38%  { opacity: 0.6; background-position: 80% 80%; }
      /* Hold — colors deepen */
      43%  { opacity: 0.8; background-position: 70% 70%;
             background: linear-gradient(135deg,
               #7986cb, #9575cd, #4fc3f7, #4db6ac, #ffab91,
               #7986cb, #9575cd, #4fc3f7, #4db6ac, #ffab91); background-size: 1000% 1000%; }
      48%  { opacity: 0.9; background-position: 60% 60%; }
      /* Peak */
      53%  { opacity: 1.0; background-position: 50% 50%;
             background: linear-gradient(135deg,
               #5c6bc0, #7e57c2, #29b6f6, #26c6da, #ff8a65,
               #5c6bc0, #7e57c2, #29b6f6, #26c6da, #ff8a65); background-size: 1000% 1000%; }
      58%  { opacity: 0.9; background-position: 40% 40%; }
      /* Fade out — slide toward top-left */
      63%  { opacity: 0.6; background-position: 30% 30%;
             background: linear-gradient(135deg,
               #7986cb, #9575cd, #4fc3f7, #4db6ac, #ffab91,
               #7986cb, #9575cd, #4fc3f7, #4db6ac, #ffab91); background-size: 1000% 1000%; }
      68%  { opacity: 0.2; background-position: 15% 15%; }
      73%  { opacity: 0;   background-position: 0% 0%; }
      /* Hidden */
      78%  { opacity: 0; background-position: 0% 0%; }
      100% { opacity: 0; background-position: 0% 0%; }
    }

    /*
     * Additional subtle shimmer: a radial glow that pulses slowly.
     * This adds depth without obscuring the gradient layers below.
     */
    .xx-glow-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 8s ease-in-out infinite alternate;
    }
    @keyframes glowPulse {
      0%   { opacity: 0.15; }
      100% { opacity: 0.40; }
    }

    /* ===== XX-UI CUSTOM LOADING SPINNER ===== */
    @keyframes xxSpin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes xxSpinDash {
      0%   { stroke-dashoffset: 126; }
      50%  { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 126; }
    }
    .xx-ui-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      animation: xxSpin 1.2s linear infinite;
    }
    .xx-ui-spinner-circle {
      fill: none;
      stroke: url(#logoGrad);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 126;
      stroke-dashoffset: 126;
      animation: xxSpinDash 1.5s ease-in-out infinite;
    }

    /* ===== LIGHT THEME: transparent layout backgrounds (all pages including login) ===== */
    .light #app,
    .light #content-layout,
    .light #content-layout .ant-layout-content,
    .light #content-layout .ant-spin-nested-loading,
    .light #content-layout .ant-spin-container,
    .light .login-app,
    .light .login-app .ant-layout-content,
    .light .login-app .under,
    .light .login-app .ant-layout {
      background: transparent !important;
    }

    /* ===== LIGHT THEME: login card glassmorphism ===== */
    .light #login {
      background: rgba(255, 255, 255, 0.20) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      border: 1px solid rgba(255, 255, 255, 0.30) !important;
      border-radius: 16px !important;

    }

    }

    /* ===== LIGHT THEME: sidebar glassmorphism ===== */
    .light .ant-layout-sider {
      background: rgba(255, 255, 255, 0.15) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
    }
    .light .ant-layout-sider .ant-menu {
      background: transparent !important;
    }

    /* ===== LIGHT THEME: mobile drawer glassmorphism ===== */
    .light .ant-drawer-content-wrapper,
    .light .ant-drawer-content {
      background: rgba(255, 255, 255, 0.80) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
    }
    .light .ant-drawer-wrapper-body {
      background: transparent !important;
    }
    .light .ant-drawer .ant-menu {
      background: transparent !important;
    }

    /* ===== LIGHT THEME: ALL cards — high transparency glassmorphism ===== */
    .light #content-layout .ant-card {
      background: rgba(255, 255, 255, 0.35) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.50) !important;
      box-shadow: 0 4px 24px rgba(120, 140, 220, 0.12) !important;
      transition: all 0.3s ease !important;
    }
    .light #content-layout .ant-card:hover {
      background: rgba(255, 255, 255, 0.42) !important;
      box-shadow: 0 0 20px var(--xx-glow-color), 0 6px 32px rgba(120, 140, 220, 0.20) !important;
      border-color: var(--xx-glow-border) !important;
      transform: translateY(-2px);
    }

    /* ===== DARK THEME: transparent layouts (all pages including login) ===== */
    .dark #app,
    .dark #content-layout,
    .dark #content-layout .ant-layout-content,
    .dark #content-layout .ant-spin-nested-loading,
    .dark #content-layout .ant-spin-container,
    .dark .login-app,
    .dark .login-app .ant-layout-content,
    .dark .login-app .under,
    .dark .login-app .ant-layout {
      background: transparent !important;
    }

    /* ===== DARK THEME: login card glassmorphism ===== */
    .dark #login {
      background: rgba(10, 18, 34, 0.35) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      border: 1px solid rgba(255, 255, 255, 0.10) !important;
      border-radius: 16px !important;
      padding: 32px !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.30) !important;
    }
    /* Login page waves — very subtle so gradient shows through */
    .dark .waves-header .waves use {
      opacity: 0.2 !important;
    }

    /* ===== DARK THEME: sidebar glassmorphism ===== */
    .dark .ant-layout-sider {
      background: rgba(10, 18, 34, 0.40) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
    }
    .dark .ant-layout-sider .ant-menu {
      background: transparent !important;
    }

    /* ===== DARK THEME: mobile drawer ===== */
    .dark .ant-drawer-content-wrapper,
    .dark .ant-drawer-content {
      background: rgba(10, 18, 34, 0.85) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
    }
    .dark .ant-drawer-wrapper-body {
      background: transparent !important;
    }
    .dark .ant-drawer .ant-menu {
      background: transparent !important;
    }

    /* ===== DARK THEME: cards glassmorphism + glow hover ===== */
    .dark #content-layout .ant-card {
      background: rgba(15, 25, 45, 0.45) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25) !important;
      transition: all 0.3s ease !important;
    }
    .dark #content-layout .ant-card:hover {
      background: rgba(20, 32, 55, 0.50) !important;

      border-color: var(--xx-glow-border) !important;

    }
    [v-cloak] {

    }

    }
  </style>

<body>
  <div id="message"></div>
  <script>
    (function() {
      /* Add the glow overlay element to the DOM */
      function addGlowOverlay() {
        try {
          if (!document.querySelector('.xx-glow-overlay')) {
            var glow = document.createElement('div');
            glow.className = 'xx-glow-overlay';
            document.body.appendChild(glow);
          }
        } catch(e) {}
      }
      function applyGradient() {
        try {
          var doc = document.documentElement;
          doc.style.setProperty('background-attachment', 'fixed', 'important');
          doc.style.setProperty('min-height', '100%', 'important');
          document.body.style.setProperty('background', 'transparent', 'important');
          addGlowOverlay();
          var observer = new MutationObserver(function() {
            var app = document.getElementById('app');
            if (app) {
              app.style.setProperty('background', 'transparent', 'important');
              /* Also ensure all ant-layout children are transparent */
              var layouts = app.querySelectorAll('.ant-layout, .ant-layout-content, .ant-spin-nested-loading, .ant-spin-container');
              for (var j = 0; j < layouts.length; j++) {
                layouts[j].style.setProperty('background', 'transparent', 'important');
              }
              var isDark = document.body.classList.contains('dark');
              var sider = app.querySelector('.ant-layout-sider');
              if (sider) {
                sider.style.setProperty('background', isDark ? 'rgba(10,18,34,0.40)' : 'rgba(255,255,255,0.15)', 'important');
                sider.style.setProperty('backdrop-filter', 'blur(12px)', 'important');
              }
              var cards = app.querySelectorAll('.ant-card');
              for (var i = 0; i < cards.length; i++) {
                cards[i].style.setProperty('background', isDark ? 'rgba(15,25,45,0.45)' : 'rgba(255,255,255,0.35)', 'important');
                cards[i].style.setProperty('backdrop-filter', 'blur(20px)', 'important');
              }
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        } catch(e) {}
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyGradient);
      } else {
        applyGradient();
      }
    })();
  </script>
{{ end }}
